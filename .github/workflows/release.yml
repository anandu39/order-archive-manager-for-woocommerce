name: Build Release Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Production Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Remove Development Files
        run: |
          rm -rf tests
          rm -f phpstan.neon
          rm -f phpcs.xml.dist

      - name: Prepare Build Directory
        run: |
          mkdir -p build/order-archive-manager-for-woocommerce
          rsync -av ./ build/order-archive-manager-for-woocommerce \
            --exclude build \
            --exclude .git \
            --exclude .github \
            --exclude .gitignore \
            --exclude .gitattributes \
            --exclude composer.json \
            --exclude composer.lock \
            --exclude phpstan.neon \
            --exclude phpstan-stubs.php \
            --exclude phpcs.xml.dist \
            --exclude tests \
            --exclude '*.md' \
            --exclude '.DS_Store'

      - name: Create ZIP
        run: |
          cd build
          zip -r WooCommerce-Order-Archive-Manager-${{ github.ref_name }}.zip order-archive-manager-for-woocommerce

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Woo Order Archive Manager ${{ github.ref_name }}
          body: |
            ## Woo Order Archive Manager ${{ github.ref_name }}

            ### Installation
            1. Download the ZIP file below
            2. Go to **Plugins → Add New → Upload Plugin** in your WordPress admin
            3. Upload the ZIP and activate

            ### Requirements
            - WordPress 6.0+
            - WooCommerce (latest recommended)
            - PHP 8.2+
            - MySQL with InnoDB engine
          files: build/WooCommerce-Order-Archive-Manager-${{ github.ref_name }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}